<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zawadibora Farm - Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #1a3c34, #2a5c4e); min-height: 100vh; display: flex; align-items: center; }
.login-card { border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.login-card .card-header { background: #1a3c34; color: #e8c87a; border-radius: 16px 16px 0 0; text-align: center; font-weight: 700; font-size: 1.3rem; }
</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card login-card">
        <div class="card-header py-3"><i class="bi bi-shop"></i> Zawadibora Farm Feeds Ltd</div>
        <div class="card-body p-4">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-gold w-100">Login</button>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
